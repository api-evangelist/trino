description: >-
  Trino is an open-source, distributed SQL query engine built for lightning-fast analytics
  over large, heterogeneous data sets. Originally forked from Presto (which emerged
  at Facebook), it supports ANSI-compliant SQL across a wide range of storage systems from
  data lakes (S3, HDFS, Iceberg) to relational and NoSQL databases (MySQL, PostgreSQL,
  Cassandra, MongoDB, Elasticsearch, Kafka, and more).
