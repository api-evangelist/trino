apis:
  - aid: trino:trino-client-api
    name: Trino Client REST API
    tags:
      - Analytics
      - Big Data
      - Queries
      - SQL
    humanURL: https://trino.io/docs/current/develop/client-protocol.html
    baseURL: http://localhost:8080
    properties:
      - url: https://trino.io/docs/current/develop/client-protocol.html
        type: Documentation
      - url: openapi/trino-client-api-openapi.yml
        type: OpenAPI
    description: >-
      The Trino Client REST API enables clients to submit SQL queries to a Trino coordinator
      and retrieve results. Clients POST SQL to /v1/statement, then poll GET on the returned
      nextUri, and may DELETE nextUri to cancel. Used by all Trino client drivers (Python,
      Go, Java, JavaScript) and data tools like dbt, Grafana, and Apache Superset.
